services:
  - type: web
    name: academy-saas-backend
    env: node
    region: frankfurt
    plan: free
    # Install dependencies across all workspaces, build the typescript files, and initialize MongoDB
    buildCommand: "npm ci --include=dev && npm run build --workspaces && npm run mongo:init"
    # Start the compiled javascript from the gateway service (use npm workspaces)
    startCommand: "npm --workspace=@academy-saas/gateway run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_URL
        value: "mysql://3aYLhuZRvvXoV7h.root:SgZMrxQnjQM7LOT4@gateway01.eu-central-1.prod.aws.tidbcloud.com:4000/?ssl={\"rejectUnauthorized\":true}"
      - key: JWT_SECRET
        value: "production-jwt-secret-replace-me"
      - key: JWT_REFRESH_SECRET
        value: "production-refresh-secret-replace-me"
      - key: TENANT_HEADER
        value: "x-tenant-id"
      - key: DEFAULT_TENANT
        value: "demo"
      # NOTE: Replace the placeholder values below with real connection strings
      - key: MONGO_URL
        value: "mongodb+srv://chermitisami69_db_user:UrNEBFqUGgxb0dv8@cfa.vfjmoa4.mongodb.net/?appName=CFA"
      - key: REDIS_URL
        value: "REPLACE_WITH_YOUR_REDIS_URL"
      # Keep MONOLITH=true to run all services inside the unified gateway; set to 'false' to enable proxy mode
      - key: MONOLITH
        value: "true"
