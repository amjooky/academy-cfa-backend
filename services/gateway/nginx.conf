events {
    worker_connections 1024;
}

http {
    upstream auth {
        server auth-service:3001;
    }

    upstream academy {
        server academy-service:3002;
    }

    upstream planning {
        server planning-service:3003;
    }

    upstream pedagogy {
        server pedagogy-service:3004;
    }

    upstream payment {
        server payment-service:3005;
    }

    upstream notification {
        server notification-service:3006;
    }

    upstream gamification {
        server gamification-service:3007;
    }

    upstream ai {
        server ai-service:3008;
    }

    upstream analytics {
        server analytics-service:3009;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/v1/auth {
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/academy {
            proxy_pass http://academy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/planning {
            proxy_pass http://planning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/pedagogy {
            proxy_pass http://pedagogy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/payment {
            proxy_pass http://payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/notification {
            proxy_pass http://notification;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/gamification {
            proxy_pass http://gamification;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/ai {
            proxy_pass http://ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/analytics {
            proxy_pass http://analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
